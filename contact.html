<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="social">
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="contact.html">Contact</a>
</div>

<div class="container">
  <div class="section">

    <div class="contact-wrap">

      <!-- FORM -->
      <div class="contact-form">
        <h3>Send a Message ✉️</h3>

        <form id="contactForm" action="https://formspree.io/f/mlgapaba" method="POST">

          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>

          <div class="custom-select">
            <select name="country_code" required>
              <option value="">Code</option>
              <option value="+91">🇮🇳 +91</option>
            </select>

            <input type="tel" name="phone" placeholder="Phone Number" required>
          </div>

          <textarea name="message" required></textarea>

          <button type="submit" id="submitBtn">Send Message</button>
        </form>
      </div>

      <!-- SOCIAL -->
      <div class="contact-info">
        <h3>Connect With Me</h3>
        <div class="contact-links">
          <a href="tel:+919549367808" class="contact-item">Call</a>
          <a href="mailto:hasanaadil27@gmail.com" class="contact-item">Email</a>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="js/main.js"></script>

<div id="toast" class="toast">
  <i id="toastIcon"></i>
  <span id="toastMsg"></span>
</div>

</body>
</html>
